<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>{{ isEditMode ? 'Edit Invoice' : 'Create Invoice' }}</h3>

    <a routerLink="/invoices" class="btn btn-secondary">
      Back
    </a>
  </div>

  <div *ngIf="errorMessage" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="successMessage" class="alert alert-success">
    {{ successMessage }}
  </div>

  <div *ngIf="isLoading" class="alert alert-info">
    Loading invoice...
  </div>

  <div *ngIf="!isLoading" class="card shadow">
    <div class="card-body">
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Serial</label>
          <input
            class="form-control"
            [value]="isEditMode ? serial : 'Auto Generated'"
            readonly
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Invoice Date</label>
          <input
            class="form-control"
            [value]="isEditMode ? (invoiceDate | date:'short') : 'Auto Generated'"
            readonly
          />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Store</label>
          <select class="form-select" name="storeId" [(ngModel)]="storeId">
            <option [ngValue]="0">Select Store</option>
            <option *ngFor="let store of stores" [ngValue]="store.id">
              {{ store.name }}
            </option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Customer</label>
          <select class="form-select" name="customerId" [(ngModel)]="customerId">
            <option [ngValue]="0">Select Customer</option>
            <option *ngFor="let customer of customers" [ngValue]="customer.id">
              {{ customer.name }}
            </option>
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Note</label>
        <textarea
          class="form-control"
          rows="3"
          name="note"
          [(ngModel)]="note"
        ></textarea>
      </div>

      <hr />

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5>Invoice Items</h5>

        <button class="btn btn-outline-primary" type="button" (click)="addItem()">
          Add
        </button>
      </div>

      <div class="table-responsive">
        <table class="table table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th style="width: 25%;">Product</th>
              <th>Quantity</th>
              <th>Price</th>
              <th>Discount %</th>
              <th>Tax %</th>
              <th>Total</th>
              <th style="width: 90px;">Action</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let item of items; let i = index">
              <td>
                <select
                  class="form-select"
                  name="productId{{ i }}"
                  [(ngModel)]="item.productId"
                  (ngModelChange)="onProductChange(item)"
                >
                  <option [ngValue]="0">Select Product</option>
                  <option *ngFor="let product of products" [ngValue]="product.id">
                    {{ product.name }}
                  </option>
                </select>
              </td>

              <td>
                <input
                  type="number"
                  class="form-control"
                  name="quantity{{ i }}"
                  [(ngModel)]="item.quantity"
                  (ngModelChange)="calculateItemTotal(item)"
                  min="1"
                />
              </td>

              <td>
                <input
                  type="number"
                  class="form-control"
                  name="price{{ i }}"
                  [(ngModel)]="item.price"
                  readonly
                />
              </td>

              <td>
                <input
                  type="number"
                  class="form-control"
                  name="discount{{ i }}"
                  [(ngModel)]="item.discountPercentage"
                  (ngModelChange)="calculateItemTotal(item)"
                  min="0"
                  max="100"
                />
              </td>

              <td>
                <input
                  type="number"
                  class="form-control"
                  name="tax{{ i }}"
                  [(ngModel)]="item.taxPercentage"
                  (ngModelChange)="calculateItemTotal(item)"
                  min="0"
                  max="100"
                />
              </td>

              <td>
                <input
                  type="number"
                  class="form-control"
                  name="total{{ i }}"
                  [value]="item.total"
                  readonly
                />
              </td>

              <td>
                <button
                  class="btn btn-sm btn-danger"
                  type="button"
                  (click)="removeItem(i)"
                  [disabled]="items.length === 1"
                >
                  Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-end mb-3">
        <h5>Total Price: {{ invoiceTotal }}</h5>
      </div>

      <div class="d-flex justify-content-end">
        <button
          class="btn btn-success px-4"
          type="button"
          (click)="submit()"
          [disabled]="isSaving"
        >
          {{ isSaving ? 'Saving...' : 'Submit' }}
        </button>
      </div>
    </div>
  </div>
</div>
